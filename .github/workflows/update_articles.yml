name: Update articles
permissions:
  contents: read

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_PROD || secrets.DATABASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install SQL Server ODBC runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg lsb-release
          curl -sSL -O https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc unixodbc-dev odbcinst

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Diagnose SQL driver selection
        run: |
          python - <<'PY'
          import os
          from services.article_repository import _pyodbc_usable, normalize_database_url

          print(f"pyodbc_usable={_pyodbc_usable()}")
          normalized = normalize_database_url(os.environ["DATABASE_URL"])
          print(f"normalized_scheme={normalized.split('://', 1)[0]}")

          try:
              import pyodbc
              print(f"pyodbc_drivers={pyodbc.drivers()}")
          except Exception as exc:
              print(f"pyodbc_import_error={type(exc).__name__}: {exc}")
          PY

      - name: Install Playwright browsers (FA fallback path)
        run: python -m playwright install --with-deps chromium

      - name: Run Foreign Affairs ingestion
        run: python summarize_fa_hardened.py 7

      - name: Run Foreign Policy ingestion
        run: python summarize_fp.py 7
