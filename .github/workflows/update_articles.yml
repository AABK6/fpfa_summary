name: Update articles
permissions:
  contents: read

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'pressreview-458312' }}
  ARTICLES_COLLECTION: ${{ vars.ARTICLES_COLLECTION || 'articles' }}

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ARTICLE_STORE: firestore
      FIRESTORE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'pressreview-458312' }}
      ARTICLES_COLLECTION: ${{ vars.ARTICLES_COLLECTION || 'articles' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Diagnose article store selection
        run: |
          python - <<'PY'
          from services.article_repository import ArticleRepository

          repo = ArticleRepository()
          print(f"repository_target={repo.database_url}")
          repo.close()
          PY

      - name: Install Playwright browsers (FA fallback path)
        run: python -m playwright install --with-deps chromium

      - name: Run Foreign Affairs ingestion
        run: python summarize_fa_hardened.py 7

      - name: Run Foreign Policy ingestion
        run: python summarize_fp.py 7
