name: Deploy Flutter Web to Azure Static Web Apps

on:
  push:
    branches:
      - master
    paths:
      - fpfa_app/**
      - .github/workflows/deploy_flutter_static_web_apps.yml
  workflow_dispatch:

jobs:
  test-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: fpfa_app

      - name: Analyze
        run: flutter analyze
        working-directory: fpfa_app

      - name: Run tests
        run: flutter test
        working-directory: fpfa_app

  deploy-production:
    runs-on: ubuntu-latest
    needs: test-web
    environment:
      name: Production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: fpfa_app

      - name: Build web (production API URL)
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL_PROD || 'https://ppfflaskapp.azurewebsites.net' }}
        run: flutter build web --dart-define=API_BASE_URL=${API_BASE_URL}
        working-directory: fpfa_app

      - name: Deploy to Azure Static Web Apps (Production)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: fpfa_app/build/web
          production_branch: master
          skip_app_build: true
