name: Deploy Flutter Web to Firebase Hosting

on:
  push:
    branches:
      - master
    paths:
      - fpfa_app/**
      - firebase.json
      - .firebaserc
      - .github/workflows/deploy_flutter_static_web_apps.yml
  workflow_dispatch:

env:
  API_BASE_URL_PROD: ${{ vars.API_BASE_URL_PROD || 'https://fpfa-summary-api-1028212947283.europe-west1.run.app' }}

jobs:
  test-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: fpfa_app

      - name: Analyze
        run: flutter analyze
        working-directory: fpfa_app

      - name: Run tests
        run: flutter test
        working-directory: fpfa_app

  deploy-production:
    runs-on: ubuntu-latest
    needs: test-web
    environment:
      name: Production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: fpfa_app

      - name: Build web
        run: flutter build web --dart-define=API_BASE_URL=${API_BASE_URL_PROD}
        working-directory: fpfa_app

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
