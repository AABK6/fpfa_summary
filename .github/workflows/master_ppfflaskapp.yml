name: Build, Test, and Deploy Backend to Cloud Run

on:
  push:
    branches:
      - master
    paths:
      - app.py
      - main.py
      - requirements.txt
      - summarize_fa.py
      - summarize_fa_hardened.py
      - summarize_fp.py
      - models/**
      - services/**
      - scripts/**
      - static/**
      - templates/**
      - tests/**
      - Dockerfile
      - .dockerignore
      - .github/workflows/master_ppfflaskapp.yml
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'pressreview-458312' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  GCP_BACKEND_SERVICE: ${{ vars.GCP_BACKEND_SERVICE || 'fpfa-summary-api' }}
  GCP_ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY || 'fpfa' }}
  ARTICLES_COLLECTION: ${{ vars.ARTICLES_COLLECTION || 'articles' }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit and integration tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m pytest tests -q

  parser-canary-live:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install parser canary dependencies
        run: |
          pip install \
            beautifulsoup4 requests google-genai \
            playwright playwright-stealth SQLAlchemy

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run live parser canary
        run: python scripts/live_parser_canary.py

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-test, parser-canary-live]
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.service_url }}
    permissions:
      contents: read
      id-token: write
    outputs:
      prod_url: ${{ steps.deploy.outputs.service_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "${GCP_ARTIFACT_REPOSITORY}" \
            --location "${GCP_REGION}" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "${GCP_ARTIFACT_REPOSITORY}" \
            --repository-format=docker \
            --location "${GCP_REGION}" \
            --description "FPFA backend images"

      - name: Build container image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}/${GCP_BACKEND_SERVICE}:${GITHUB_SHA}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"
          gcloud builds submit --tag "${IMAGE}"

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy "${GCP_BACKEND_SERVICE}" \
            --image "${IMAGE}" \
            --platform managed \
            --region "${GCP_REGION}" \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 1 \
            --memory 512Mi \
            --set-env-vars "ARTICLE_STORE=firestore,FIRESTORE_PROJECT_ID=${GCP_PROJECT_ID},ARTICLES_COLLECTION=${ARTICLES_COLLECTION}"

          URL="$(gcloud run services describe "${GCP_BACKEND_SERVICE}" --region "${GCP_REGION}" --format='value(status.url)')"
          echo "service_url=${URL}" >> "${GITHUB_OUTPUT}"

  smoke-production:
    runs-on: ubuntu-latest
    needs: deploy-production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke test dependency
        run: pip install requests

      - name: Run production smoke tests
        run: |
          python scripts/smoke_test_api.py --base-url "${{ needs.deploy-production.outputs.prod_url }}"
